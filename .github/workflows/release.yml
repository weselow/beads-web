name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: beads-web-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: beads-web-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: beads-web-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: beads-web-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build server
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: server

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: cp server/target/${{ matrix.target }}/release/beads-server ${{ matrix.artifact }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        run: copy server\target\${{ matrix.target }}\release\beads-server.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ inputs.version || github.ref_name }}
          tag_name: ${{ inputs.version || github.ref_name }}
          files: release/*
          generate_release_notes: true

      # Keep the self-hosted Scoop manifest (bucket/beads-web.json) in sync with
      # each release: refresh version + Windows-exe hash and commit to main.
      # Mirrors the Nix hash-refresh auto-commit already used by ci.yml.
      - name: Checkout main for Scoop manifest
        uses: actions/checkout@v5
        with:
          ref: main
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Scoop manifest
        run: |
          set -euo pipefail
          TAG="${{ inputs.version || github.ref_name }}"
          VERSION="${TAG#v}"
          HASH="$(sha256sum release/beads-web-win-x64.exe | cut -d' ' -f1)"
          cd repo
          jq --arg v "$VERSION" --arg h "$HASH" --arg tag "$TAG" \
            '.version = $v
             | .architecture."64bit".url = "https://github.com/weselow/beads-web/releases/download/" + $tag + "/beads-web-win-x64.exe#/beads-web.exe"
             | .architecture."64bit".hash = $h' \
            bucket/beads-web.json > bucket/beads-web.json.tmp
          mv bucket/beads-web.json.tmp bucket/beads-web.json
          if git diff --quiet -- bucket/beads-web.json; then
            echo "Scoop manifest already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/beads-web.json
          git commit -m "chore(scoop): update manifest for $TAG"
          git push origin main

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew update"
            exit 0
          fi
          TAG="${{ inputs.version || github.ref_name }}"
          VERSION="${TAG#v}"
          ARM=$(sha256sum release/beads-web-darwin-arm64 | cut -d' ' -f1)
          INTEL=$(sha256sum release/beads-web-darwin-x64 | cut -d' ' -f1)
          LINUX=$(sha256sum release/beads-web-linux-x64 | cut -d' ' -f1)
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/weselow/homebrew-beads-web.git" tap
          mkdir -p tap/Formula
          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__ARM_SHA__|${ARM}|g" \
              -e "s|__INTEL_SHA__|${INTEL}|g" \
              -e "s|__LINUX_SHA__|${LINUX}|g" \
              repo/packaging/homebrew/beads-web.rb.tmpl > tap/Formula/beads-web.rb
          cd tap
          if git diff --quiet -- Formula/beads-web.rb; then
            echo "Homebrew formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/beads-web.rb
          git commit -m "beads-web ${VERSION}"
          git push origin HEAD:main

  # `wingetcreate update` only works AFTER the package already exists in
  # microsoft/winget-pkgs. The first submission is a one-time manual step:
  #   wingetcreate submit packaging/winget --token <PAT>
  # This job no-ops when WINGET_TOKEN is absent.
  winget:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Submit winget manifest
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if (-not $env:WINGET_TOKEN) {
            Write-Host "WINGET_TOKEN not set — skipping winget submission"
            exit 0
          }
          $tag = "${{ inputs.version || github.ref_name }}"
          $version = $tag.TrimStart('v')
          $url = "https://github.com/weselow/beads-web/releases/download/$tag/beads-web-win-x64.exe"
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update weselow.beads-web --version $version --urls $url --submit --token $env:WINGET_TOKEN
